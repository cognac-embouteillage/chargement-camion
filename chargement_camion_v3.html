<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chargement Camion — JHC v13</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap');
:root {
  --bg:#f4f3f0;--surface:#fff;--surface2:#f0eeea;--border:#dddad4;
  --text:#1a1916;--muted:#7a756c;--accent:#1a1916;
  --gold:#b8962e;--gold-light:#f5edda;--gold-border:#e0c878;
  --green:#1a5c2e;--green-bg:#eafaf0;--green-border:#7ecda0;
  --error:#8b1a1a;--error-bg:#fdf0f0;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.logo{display:flex;align-items:center;gap:8px}
.logo-badge{background:var(--accent);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:3px 8px;border-radius:4px}
.logo-title{font-size:13px;font-weight:700}
.ver{font-family:'IBM Plex Mono',monospace;font-size:10px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:2px 7px;border-radius:4px}
.clock{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);text-align:right;line-height:1.4}

.main{max-width:560px;margin:20px auto;padding:0 16px;display:flex;flex-direction:column;gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-hd{padding:13px 18px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700}
.card-body{padding:18px}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:5px}
.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted)}
.inp{font-family:'IBM Plex Sans',sans-serif;font-size:14px;padding:10px 12px;border:1px solid var(--border);border-radius:7px;background:var(--surface2);color:var(--text);outline:none;width:100%}
.inp:focus{border-color:var(--gold);background:var(--surface)}
select.inp{cursor:pointer}

/* Compteur */
.counter{text-align:center;padding:14px;background:var(--gold-light);border:1px solid var(--gold-border);border-radius:10px;margin-bottom:14px}
.counter-num{font-family:'IBM Plex Mono',monospace;font-size:52px;font-weight:600;color:var(--gold);line-height:1}
.counter-lbl{font-size:11px;color:var(--muted);margin-top:3px}

/* Caméra */
.cam-box{position:relative;background:var(--surface2);border:2px dashed var(--border);border-radius:10px;aspect-ratio:4/3;overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.cam-box video,.cam-box canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
.cam-ph{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--muted);text-align:center;padding:16px}
.cam-ph .ico{font-size:44px}
.cam-ph p{font-size:12px;line-height:1.5}
.loading-ov{position:absolute;inset:0;background:rgba(244,243,240,.9);display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px;z-index:10}
.loading-ov.on{display:flex}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-txt{font-size:12px;color:var(--muted)}

.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;width:100%}
.btn:hover:not(:disabled){background:var(--surface2)}
.btn:disabled{opacity:.38;cursor:not-allowed}
.btn-dark{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-dark:hover:not(:disabled){background:#2d2d2d}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#fff;font-size:15px;padding:14px}
.btn-gold:hover:not(:disabled){background:#9e7d24}
.btn-cap{background:var(--surface2);border:2px solid var(--accent);color:var(--accent);font-size:14px;padding:13px}
.btn2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}

.msg{font-size:11px;padding:8px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:8px}
.msg.ok{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.msg.err{background:var(--error-bg);border-color:#e8aaaa;color:var(--error)}
.msg.load{background:var(--gold-light);border-color:var(--gold-border);color:var(--gold)}

.list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto}
.list-empty{text-align:center;padding:20px;color:var(--muted);font-size:12px}
.pal{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between;animation:si .2s ease}
@keyframes si{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.pal-sscc{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600}
.pal-time{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
.pal-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.pal-del:hover{color:var(--error);background:var(--error-bg)}
.manual-row{display:flex;gap:8px;margin-top:8px}
.manual-inp{flex:1;font-family:'IBM Plex Mono',monospace;font-size:13px;padding:10px 12px;border:1px solid var(--border);border-radius:7px;background:var(--surface2);color:var(--text);outline:none}
.manual-inp:focus{border-color:var(--gold)}

#hidden-canvas{display:none}
</style>
</head>
<body>
<canvas id="hidden-canvas"></canvas>

<header>
  <div class="logo">
    <div class="logo-badge">JHC</div>
    <div class="logo-title">Chargement Camion</div>
    <div class="ver">v13</div>
  </div>
  <div class="clock" id="clock">—</div>
</header>

<div class="main">

  <!-- BL + DATE -->
  <div class="card">
    <div class="card-hd">📋 Informations</div>
    <div class="card-body">
      <div class="row2">
        <div class="field">
          <label class="lbl">N° BL / Camion</label>
          <input class="inp" id="bl" placeholder="BL-2026-0142">
        </div>
        <div class="field">
          <label class="lbl">Date</label>
          <input type="date" class="inp" id="date">
        </div>
      </div>
    </div>
  </div>

  <!-- SCAN -->
  <div class="card">
    <div class="card-hd">📷 Scan palettes</div>
    <div class="card-body">
      <div class="counter">
        <div class="counter-num" id="count">0</div>
        <div class="counter-lbl">palette(s) scannée(s)</div>
      </div>

      <div class="cam-box" id="cam-box">
        <div class="cam-ph" id="cam-ph">
          <div class="ico">📦</div>
          <p>Pointez vers l'étiquette SSCC<br>puis capturez</p>
        </div>
        <video id="vid" autoplay playsinline></video>
        <canvas id="cnv"></canvas>
        <div class="loading-ov" id="loading">
          <div class="spin"></div>
          <div class="spin-txt">Lecture SSCC…</div>
        </div>
      </div>

      <div class="btn2">
        <button class="btn" id="btn-start" onclick="startCam()">▶ Démarrer</button>
        <button class="btn" id="btn-stop" onclick="stopCam()" disabled>■ Arrêter</button>
      </div>
      <!-- Capturer → analyse auto (comme l'appli traçabilité) -->
      <button class="btn btn-cap" id="btn-cap" onclick="capture()" disabled>⊙ Capturer → lecture SSCC auto</button>

      <div class="manual-row">
        <input class="manual-inp" id="manual" placeholder="Saisie manuelle SSCC..." maxlength="30" onkeydown="if(event.key==='Enter')addManuel()">
        <button class="btn btn-dark" onclick="addManuel()" style="width:auto;padding:10px 14px">+</button>
      </div>
      <div class="msg" id="msg">Démarrez la caméra</div>
    </div>
  </div>

  <!-- LISTE -->
  <div class="card">
    <div class="card-hd">🚛 Palettes chargées</div>
    <div class="card-body">
      <div class="list" id="list">
        <div class="list-empty">Aucune palette scannée</div>
      </div>
    </div>
  </div>

  <!-- ENVOI -->
  <div class="card">
    <div class="card-hd">✅ Fin de chargement</div>
    <div class="card-body">
      <div class="field" style="margin-bottom:12px">
        <label class="lbl">Destinataire</label>
        <select class="inp" id="dest">
          <option value="">-- Sélectionnez --</option>
          <option value="aurelien@pdf16.fr">Aurélien — aurelien@pdf16.fr</option>
          <option value="jerome.briand@pdf16.fr">Jérôme — jerome.briand@pdf16.fr</option>
        </select>
      </div>
      <button class="btn btn-gold" onclick="finChargement()" id="btn-fin">📤 Envoyer rapport</button>
    </div>
  </div>

  <div style="height:30px"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const EJS_SERVICE  = 'service_oj45q8g';
const EJS_TEMPLATE = 'template_4xy4fvx';
const EJS_KEY      = 'SIFjIPjAKNPhqXzqX';

async function finChargement() {
  if (!palettes.length) { alert('Aucune palette scannée.'); return; }
  const dest = document.getElementById('dest').value;
  if (!dest) { alert('Sélectionnez un destinataire.'); return; }

  const bl   = document.getElementById('bl').value.trim() || '—';
  const date = document.getElementById('date').value || new Date().toISOString().slice(0,10);
  const btn  = document.getElementById('btn-fin');
  btn.disabled = true;
  btn.textContent = '⏳ Envoi en cours…';

  // Générer Excel
  const wb = XLSX.utils.book_new();
  const rows = [
    [`CHARGEMENT HENNESSY — BL : ${bl} — Date : ${date}`],
    [`${palettes.length} palettes PF chargées`],
    [],
    ['N°', 'SSCC PF', 'Heure scan'],
    ...palettes.map((p, i) => [i+1, p.sscc, p.time])
  ];
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:4},{wch:24},{wch:12}];
  ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:2}},{s:{r:1,c:0},e:{r:1,c:2}}];
  XLSX.utils.book_append_sheet(wb, ws, 'Chargement');
  const fname = `chargement_${bl.replace(/[^a-zA-Z0-9]/g,'_')}_${date}.xlsx`;
  const wbout = XLSX.write(wb, {bookType:'xlsx', type:'base64'});
  XLSX.writeFile(wb, fname);

  // Charger EmailJS dynamiquement (comme l'appli qui fonctionne)
  function loadEmailJS(cb) {
    if (typeof emailjs !== 'undefined') { cb(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
    s.onload = cb;
    s.onerror = () => { btn.disabled = false; btn.textContent = '📤 Envoyer rapport'; alert('Erreur chargement EmailJS'); };
    document.head.appendChild(s);
  }

  loadEmailJS(() => {
    emailjs.init({publicKey: EJS_KEY});
    const ssccList = palettes.map((p, i) => `${i+1}. ${p.sscc}`).join('\n');
    emailjs.send(EJS_SERVICE, EJS_TEMPLATE, {
      to_email: dest,
      subject:  `Chargement Hennessy — BL ${bl} — ${date}`,
      message:  `Bonjour,\n\nVeuillez trouver en pièce jointe le rapport de chargement Hennessy.\n\nBL : ${bl}\nDate : ${date}\nPalettes : ${palettes.length}\n\n${ssccList}\n\nCordialement,\nJHC`,
      attachment_name: fname,
      my_file: wbout,
    }).then(() => {
      btn.textContent = '✅ Rapport envoyé !';
      btn.style.background = 'var(--green)';
      btn.style.borderColor = 'var(--green)';
    }).catch(err => {
      btn.disabled = false;
      btn.textContent = '📤 Envoyer rapport';
      const detail = JSON.stringify(err, null, 2);
      alert('Erreur EmailJS complète :\n' + detail);
      console.error('EmailJS error:', err);
    });
  });
}

const API_KEY_LS = 'jhc_api_key';
let API_KEY = localStorage.getItem(API_KEY_LS) || '';
let camStream = null;
let palettes = [];

document.getElementById('date').value = new Date().toISOString().slice(0,10);

// Clock
setInterval(() => {
  const n = new Date();
  document.getElementById('clock').innerHTML =
    n.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}) + '<br>' + n.toLocaleTimeString('fr-FR');
}, 1000);

// ── CAMÉRA ──
async function startCam() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1920} }
    });
    const vid = document.getElementById('vid');
    vid.srcObject = camStream;
    vid.style.display = 'block';
    document.getElementById('cam-ph').style.display = 'none';
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled = false;
    document.getElementById('btn-cap').disabled = false;
    setMsg('📷 Cadrez l\'étiquette SSCC et appuyez sur Capturer', 'load');
  } catch(e) {
    setMsg('✗ Caméra : ' + e.message, 'err');
  }
}

function stopCam() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  document.getElementById('vid').style.display = 'none';
  document.getElementById('cam-ph').style.display = 'flex';
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('btn-cap').disabled = true;
  setMsg('Caméra arrêtée', '');
}

async function capture() {
  const vid = document.getElementById('vid');
  const hc  = document.getElementById('hidden-canvas');
  hc.width  = vid.videoWidth;
  hc.height = vid.videoHeight;
  hc.getContext('2d').drawImage(vid, 0, 0);

  // Freeze frame
  const cnv = document.getElementById('cnv');
  cnv.width  = vid.videoWidth;
  cnv.height = vid.videoHeight;
  cnv.getContext('2d').drawImage(vid, 0, 0);
  cnv.style.display = 'block';
  document.getElementById('vid').style.display = 'none';

  const b64 = await resize(hc.toDataURL('image/jpeg', 0.8).split(',')[1], 1024, 0.8);
  await lireSSCC(b64);
}

function resize(b64, max, q) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > max || h > max) {
        if (w > h) { h = Math.round(h * max / w); w = max; }
        else       { w = Math.round(w * max / h); h = max; }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      res(c.toDataURL('image/jpeg', q).split(',')[1]);
    };
    img.src = 'data:image/jpeg;base64,' + b64;
  });
}

// ── LECTURE SSCC ──
async function lireSSCC(b64) {
  // Vérifier clé API
  if (!API_KEY) {
    const k = await demanderCle();
    if (!k) {
      // Restaurer caméra
      restaurerCamera();
      return;
    }
    API_KEY = k;
    localStorage.setItem(API_KEY_LS, k);
  }

  document.getElementById('loading').classList.add('on');
  document.getElementById('btn-cap').disabled = true;
  setMsg('⏳ Lecture SSCC en cours…', 'load');

  const prompt = `Extrait le numéro SSCC de cette étiquette palette JHC/Hennessy.
Le SSCC est le grand code numérique précédé de "SSCC:" sur l'étiquette.
Réponds UNIQUEMENT avec : {"sscc":"332459906077910034"} ou {"sscc":null}`;

  try {
    let json = null;
    for (let i = 1; i <= 3; i++) {
      if (i > 1) {
        setMsg(`⏳ Tentative ${i}/3…`, 'load');
        await new Promise(r => setTimeout(r, i * 3000));
      }
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 100,
          messages: [{ role:'user', content: [
            { type:'image', source:{ type:'base64', media_type:'image/jpeg', data:b64 } },
            { type:'text', text:prompt }
          ]}]
        })
      });
      if (res.status === 529 || res.status === 503) { if (i < 3) continue; throw new Error('Serveur surchargé'); }
      if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
      json = await res.json();
      break;
    }
    const parsed = JSON.parse(json.content[0].text.trim().replace(/```json|```/g, ''));
    if (!parsed.sscc) {
      setMsg('✗ SSCC non trouvé — réessayez', 'err');
      return;
    }
    ajouterSSCC(parsed.sscc);
  } catch(e) {
    setMsg('✗ ' + e.message, 'err');
  } finally {
    document.getElementById('loading').classList.remove('on');
    restaurerCamera();
  }
}

function restaurerCamera() {
  document.getElementById('cnv').style.display = 'none';
  if (camStream) {
    document.getElementById('vid').style.display = 'block';
    document.getElementById('btn-cap').disabled = false;
  }
}

// Saisie clé API sans prompt() (interdit sur GitHub Pages)
function demanderCle() {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center';
    overlay.innerHTML = `
      <div style="background:#fff;border-radius:14px;padding:24px;width:90%;max-width:340px">
        <div style="font-size:22px;margin-bottom:8px">🔑</div>
        <div style="font-size:14px;font-weight:700;margin-bottom:6px">Clé API requise</div>
        <div style="font-size:11px;color:#7a756c;margin-bottom:14px">Saisissez votre clé Anthropic (sk-ant-...)</div>
        <input id="_key_inp" type="password" placeholder="sk-ant-api03-..."
          style="width:100%;font-family:monospace;font-size:12px;padding:10px;border:1px solid #ddd;border-radius:7px;outline:none;margin-bottom:10px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <button onclick="this.closest('div').parentElement.remove();resolveKey(null)"
            style="padding:10px;border:1px solid #ddd;border-radius:7px;background:#f5f5f5;cursor:pointer;font-weight:600">Annuler</button>
          <button onclick="resolveKey(document.getElementById('_key_inp').value)"
            style="padding:10px;border:none;border-radius:7px;background:#1a1916;color:#fff;cursor:pointer;font-weight:700">Valider</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    window.resolveKey = (k) => {
      overlay.remove();
      resolve(k && k.startsWith('sk-ant-') ? k : null);
    };
    setTimeout(() => document.getElementById('_key_inp')?.focus(), 100);
    document.getElementById('_key_inp').onkeydown = e => { if (e.key === 'Enter') window.resolveKey(e.target.value); };
  });
}

// ── GESTION PALETTES ──
function addManuel() {
  const v = document.getElementById('manual').value.trim().replace(/\s/g, '');
  if (!v) return;
  ajouterSSCC(v);
  document.getElementById('manual').value = '';
}

function ajouterSSCC(sscc) {
  const s = sscc.trim();
  if (palettes.some(p => p.sscc === s)) {
    setMsg(`🚫 DOUBLON — ${s} déjà scanné`, 'err');
    return;
  }
  palettes.push({ sscc: s, time: new Date().toLocaleTimeString('fr-FR') });
  render();
  setMsg(`✓ Palette ajoutée — ${s}`, 'ok');
}

function supprimer(i) { palettes.splice(i, 1); render(); }

function render() {
  document.getElementById('count').textContent = palettes.length;
  const list = document.getElementById('list');
  if (!palettes.length) {
    list.innerHTML = '<div class="list-empty">Aucune palette scannée</div>';
    return;
  }
  list.innerHTML = palettes.map((p, i) => `
    <div class="pal">
      <div>
        <div class="pal-sscc">${i+1}. ${p.sscc}</div>
        <div class="pal-time">${p.time}</div>
      </div>
      <button class="pal-del" onclick="supprimer(${i})">✕</button>
    </div>`).join('');
}

function setMsg(msg, cls) {
  const el = document.getElementById('msg');
  el.textContent = msg;
  el.className = 'msg' + (cls ? ' ' + cls : '');
}

// ── FIN DE CHARGEMENT ──

</script>
</body>
</html>
