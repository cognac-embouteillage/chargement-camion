<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chargement Camion — JHC v7</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap');
:root {
  --bg:#f4f3f0; --surface:#fff; --surface2:#f0eeea; --border:#dddad4;
  --text:#1a1916; --muted:#7a756c; --accent:#1a1916;
  --gold:#b8962e; --gold-light:#f5edda; --gold-border:#e0c878;
  --green:#1a5c2e; --green-bg:#eafaf0; --green-border:#7ecda0;
  --error:#8b1a1a; --error-bg:#fdf0f0;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.logo{display:flex;align-items:center;gap:10px}
.logo-badge{background:var(--accent);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 8px;border-radius:4px;letter-spacing:1px}
.logo-title{font-size:14px;font-weight:700}
.ver{font-family:'IBM Plex Mono',monospace;font-size:10px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:3px 8px;border-radius:4px}
.clock{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-align:right;line-height:1.5}

.main{max-width:640px;margin:32px auto;padding:0 20px;display:flex;flex-direction:column;gap:16px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.card-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-hd h2{font-size:15px;font-weight:700}
.card-body{padding:20px}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
.inp{font-family:'IBM Plex Sans',sans-serif;font-size:15px;padding:11px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);outline:none;transition:border-color .15s;width:100%}
.inp:focus{border-color:var(--gold);background:var(--surface)}

.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 18px;border:1px solid var(--border);border-radius:9px;background:var(--surface);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;width:100%}
.btn:hover:not(:disabled){background:var(--surface2)}
.btn:disabled{opacity:.38;cursor:not-allowed}
.btn-dark{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-dark:hover:not(:disabled){background:#2d2d2d}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#fff;font-size:16px;padding:16px}
.btn-gold:hover:not(:disabled){background:#9e7d24}
.btn-cap{background:var(--surface2);border:2px solid var(--accent);color:var(--accent);font-size:15px;padding:13px}
.btn-sm{padding:8px 12px;font-size:12px;width:auto}

.cam-box{position:relative;background:var(--surface2);border:2px dashed var(--border);border-radius:10px;aspect-ratio:4/3;overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.cam-box video,.cam-box canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
.cam-ph{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--muted);padding:16px;text-align:center}
.cam-ph .ico{font-size:40px}
.cam-ph p{font-size:12px;line-height:1.5}
.loading-ov{position:absolute;inset:0;background:rgba(244,243,240,.88);display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px;z-index:10}
.loading-ov.on{display:flex}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-txt{font-size:12px;color:var(--muted)}

.btns2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.msg{font-size:12px;padding:8px 12px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:8px}
.msg.ok{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.msg.err{background:var(--error-bg);border-color:#e8aaaa;color:var(--error)}
.msg.load{background:var(--gold-light);border-color:var(--gold-border);color:var(--gold)}
.msg.warn{background:#fff8f0;border-color:#f39c12;color:#8a5a00}

.counter-big{text-align:center;padding:16px;background:var(--gold-light);border:1px solid var(--gold-border);border-radius:10px;margin-bottom:14px}
.counter-num{font-family:'IBM Plex Mono',monospace;font-size:48px;font-weight:600;color:var(--gold);line-height:1}
.counter-lbl{font-size:12px;color:var(--muted);margin-top:4px}

.list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.list-empty{text-align:center;padding:24px;color:var(--muted);font-size:13px}
.pal-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;animation:si .25s ease}
@keyframes si{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.pal-sscc{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--text)}
.pal-time{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
.pal-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.pal-del:hover{color:var(--error);background:var(--error-bg)}

.manual-row{display:flex;gap:8px;margin-top:8px}
.manual-inp{flex:1;font-family:'IBM Plex Mono',monospace;font-size:14px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);outline:none}
.manual-inp:focus{border-color:var(--gold)}

#hidden-canvas{display:none}
</style>
</head>
<body>
<canvas id="hidden-canvas"></canvas>

<header>
  <div class="logo">
    <div class="logo-badge">JHC</div>
    <div class="logo-title">Chargement Camion</div>
    <div class="ver">v7</div>
  </div>
  <div class="clock" id="clock">—</div>
</header>

<div class="main">

  <!-- BL + DATE -->
  <div class="card">
    <div class="card-hd"><h2>📋 Informations chargement</h2></div>
    <div class="card-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="field" style="margin:0">
          <label class="lbl">N° BL / Camion</label>
          <input class="inp" id="bl" placeholder="Ex : BL-2026-0142">
        </div>
        <div class="field" style="margin:0">
          <label class="lbl">Date</label>
          <input type="date" class="inp" id="date">
        </div>
      </div>
    </div>
  </div>

  <!-- SCAN -->
  <div class="card">
    <div class="card-hd"><h2>📷 Scan palettes PF</h2></div>
    <div class="card-body">
      <div class="counter-big">
        <div class="counter-num" id="count">0</div>
        <div class="counter-lbl">palette(s) scannée(s)</div>
      </div>
      <div class="cam-box" id="cam-box">
        <div class="cam-ph" id="cam-ph">
          <div class="ico">📦</div>
          <p>Pointez vers l'étiquette SSCC<br>de la palette PF</p>
        </div>
        <video id="vid" autoplay playsinline></video>
        <canvas id="cnv"></canvas>
        <div class="loading-ov" id="loading"><div class="spin"></div><div class="spin-txt">Lecture SSCC…</div></div>
      </div>
      <div class="btns2">
        <button class="btn" id="btn-start" onclick="startCam()">▶ Démarrer caméra</button>
        <button class="btn" id="btn-stop" onclick="stopCam()" disabled>■ Arrêter</button>
      </div>
      <button class="btn btn-cap" id="btn-cap" onclick="capture()" disabled>⊙ Capturer &amp; lire SSCC</button>
      <div class="manual-row">
        <input class="manual-inp" id="manual" placeholder="Saisie manuelle SSCC..." maxlength="30" onkeydown="if(event.key==='Enter')addManuel()">
        <button class="btn btn-dark btn-sm" onclick="addManuel()">+ Ajouter</button>
      </div>
      <div class="msg" id="msg">Démarrez la caméra ou saisissez un SSCC</div>
    </div>
  </div>

  <!-- LISTE -->
  <div class="card">
    <div class="card-hd"><h2>🚛 Palettes chargées</h2></div>
    <div class="card-body">
      <div class="list" id="list">
        <div class="list-empty">Aucune palette scannée</div>
      </div>
    </div>
  </div>

  <!-- FIN DE CHARGEMENT -->
  <div class="card">
    <div class="card-hd"><h2>✅ Fin de chargement</h2></div>
    <div class="card-body">
      <div class="field">
        <label class="lbl">Destinataire</label>
        <select class="inp" id="dest">
          <option value="">-- Sélectionnez --</option>
          <option value="aurelien@pdf16.fr">Aurélien — aurelien@pdf16.fr</option>
          <option value="jerome.briand@pdf16.fr">Jérôme — jerome.briand@pdf16.fr</option>
        </select>
      </div>
      <button class="btn btn-gold" onclick="finChargement()" id="btn-fin">📤 Fin de chargement — Envoyer rapport</button>
    </div>
  </div>

  <div style="height:32px"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
// ── EmailJS config ──
const EJS_SERVICE  = 'service_oj45q8g';
const EJS_TEMPLATE = 'template_4xy4fvx';
const EJS_KEY      = 'SIFjIPjAKNPhqXzqX';
emailjs.init(EJS_KEY);
const API_KEY_LS = 'jhc_api_key';
let API_KEY = localStorage.getItem(API_KEY_LS) || '';
let camStream = null;
let palettes = []; // [{sscc, time}]

// Date par défaut
document.getElementById('date').value = new Date().toISOString().slice(0,10);

// Clock
function tick() {
  const n = new Date();
  document.getElementById('clock').innerHTML =
    n.toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit',month:'short'}) + '<br>' + n.toLocaleTimeString('fr-FR');
}
tick(); setInterval(tick, 1000);

// ── CAMÉRA ──
async function startCam() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920}}});
    const vid = document.getElementById('vid');
    vid.srcObject = camStream; vid.style.display = 'block';
    document.getElementById('cam-ph').style.display = 'none';
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled = false;
    document.getElementById('btn-cap').disabled = false;
    setMsg('📷 Cadrez l\'étiquette SSCC et capturez', 'load');
  } catch(e) { setMsg('✗ Caméra indisponible : ' + e.message, 'err'); }
}

function stopCam() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  document.getElementById('vid').style.display = 'none';
  document.getElementById('cam-ph').style.display = 'flex';
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('btn-cap').disabled = true;
}

async function capture() {
  const vid = document.getElementById('vid');
  const hc  = document.getElementById('hidden-canvas');
  hc.width = vid.videoWidth; hc.height = vid.videoHeight;
  hc.getContext('2d').drawImage(vid, 0, 0);
  const cnv = document.getElementById('cnv');
  cnv.width = vid.videoWidth; cnv.height = vid.videoHeight;
  cnv.getContext('2d').drawImage(vid, 0, 0);
  cnv.style.display = 'block'; vid.style.display = 'none';
  const b64r = await resize(hc.toDataURL('image/jpeg',.8).split(',')[1], 1024, .8);
  await lireSSCC(b64r);
}

function resize(b64, max, q) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      let w=img.width, h=img.height;
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',q).split(',')[1]);
    };
    img.src='data:image/jpeg;base64,'+b64;
  });
}

async function lireSSCC(b64) {
  if (!API_KEY) {
    const k = prompt('Clé API Anthropic (sk-ant-...) :');
    if (!k) return;
    API_KEY = k; localStorage.setItem(API_KEY_LS, k);
  }
  document.getElementById('loading').classList.add('on');
  document.getElementById('btn-cap').disabled = true;
  setMsg('⏳ Lecture SSCC…', 'load');

  const prompt = `Extrait le numéro SSCC de cette étiquette palette JHC/Hennessy.
Le SSCC est le code numérique précédé de "SSCC:" ou entre parenthèses (00) sous le code-barres.
Réponds UNIQUEMENT avec : {"sscc":"332459906077910034"} ou {"sscc":null}`;

  try {
    let json = null;
    for (let i=1; i<=3; i++) {
      if (i>1) { setMsg(`⏳ Tentative ${i}/3…`,'load'); await new Promise(r=>setTimeout(r,i*3000)); }
      const res = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:100,messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
          {type:'text',text:prompt}
        ]}]})
      });
      if(res.status===529||res.status===503){if(i<3)continue;throw new Error('Serveur surchargé');}
      if(!res.ok){const e=await res.json();throw new Error(e.error?.message||`HTTP ${res.status}`);}
      json=await res.json(); break;
    }
    const parsed = JSON.parse(json.content[0].text.trim().replace(/```json|```/g,''));
    if (!parsed.sscc) { setMsg('✗ SSCC non trouvé — réessayez','err'); return; }
    ajouterSSCC(parsed.sscc);
  } catch(e) { setMsg('✗ '+e.message,'err'); }
  finally {
    document.getElementById('loading').classList.remove('on');
    if (camStream) {
      document.getElementById('cnv').style.display='none';
      document.getElementById('vid').style.display='block';
      document.getElementById('btn-cap').disabled=false;
    }
  }
}

function addManuel() {
  const v = document.getElementById('manual').value.trim().replace(/\s/g,'');
  if (!v) return;
  ajouterSSCC(v);
  document.getElementById('manual').value='';
}

function ajouterSSCC(sscc) {
  if (palettes.some(p=>p.sscc===sscc)) { setMsg(`🚫 DOUBLON — ${sscc} déjà scanné`,'err'); return; }
  palettes.push({sscc, time:new Date().toLocaleTimeString('fr-FR')});
  render();
  setMsg(`✓ Palette ajoutée — ${sscc}`,'ok');
}

function supprimer(i) { palettes.splice(i,1); render(); }

function render() {
  document.getElementById('count').textContent = palettes.length;
  const list = document.getElementById('list');
  if (!palettes.length) { list.innerHTML='<div class="list-empty">Aucune palette scannée</div>'; return; }
  list.innerHTML = palettes.map((p,i)=>`
    <div class="pal-item">
      <div>
        <div class="pal-sscc">${i+1}. ${p.sscc}</div>
        <div class="pal-time">${p.time}</div>
      </div>
      <button class="pal-del" onclick="supprimer(${i})">✕</button>
    </div>`).join('');
}

function setMsg(msg,cls) {
  const el=document.getElementById('msg');
  el.textContent=msg; el.className='msg'+(cls?' '+cls:'');
}

// ── FIN DE CHARGEMENT ──
async function finChargement() {
  if (!palettes.length) { alert('Aucune palette scannée.'); return; }
  const dest = document.getElementById('dest').value;
  if (!dest) { alert('Sélectionnez un destinataire.'); return; }

  const bl   = document.getElementById('bl').value.trim() || '—';
  const date = document.getElementById('date').value || new Date().toISOString().slice(0,10);
  const btn  = document.getElementById('btn-fin');
  btn.disabled = true;
  btn.textContent = '⏳ Envoi en cours…';

  // ── Générer Excel en base64 pour pièce jointe ──
  const wb = XLSX.utils.book_new();
  const rows = [
    [`CHARGEMENT HENNESSY — BL : ${bl} — Date : ${date}`],
    [`${palettes.length} palettes PF chargées`],
    [],
    ['N°', 'SSCC PF', 'Heure scan'],
    ...palettes.map((p,i) => [i+1, p.sscc, p.time])
  ];
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:4},{wch:24},{wch:12}];
  ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:2}},{s:{r:1,c:0},e:{r:1,c:2}}];
  XLSX.utils.book_append_sheet(wb, ws, 'Chargement');
  const fname = `chargement_${bl.replace(/[^a-zA-Z0-9]/g,'_')}_${date}.xlsx`;

  // Convertir en base64
  const wbout = XLSX.write(wb, {bookType:'xlsx', type:'base64'});

  // ── Envoyer via EmailJS avec pièce jointe ──
  const ssccList = palettes.map((p,i) => `${i+1}. ${p.sscc}`).join('\n');
  const params = {
    to_email: dest,
    subject:  `Chargement Hennessy — BL ${bl} — ${date}`,
    message:
      `Bonjour,\n\nVeuillez trouver en pièce jointe le rapport de chargement Hennessy.\n\n` +
      `BL / Camion : ${bl}\nDate : ${date}\nNombre de palettes PF : ${palettes.length}\n\n` +
      `SSCC scannés :\n${ssccList}\n\nCordialement,\nJHC — Application Chargement`,
    attachment_name: fname,
    my_file: wbout,  // base64 brut — format attendu par EmailJS Variable Attachment
  };

  try {
    await emailjs.send(EJS_SERVICE, EJS_TEMPLATE, params);
    btn.textContent = '✅ Mail envoyé avec succès !';
    btn.style.background = 'var(--green)';
    btn.style.borderColor = 'var(--green)';
    // Télécharger aussi en local
    XLSX.writeFile(wb, fname);
  } catch(e) {
    console.error(e);
    btn.disabled = false;
    btn.textContent = '📤 Fin de chargement — Envoyer rapport';
    alert(`Erreur envoi mail : ${e.text || e.message || JSON.stringify(e)}\n\nLe fichier Excel a quand même été téléchargé.`);
    XLSX.writeFile(wb, fname);
  }
}
</script>
</body>
</html>
